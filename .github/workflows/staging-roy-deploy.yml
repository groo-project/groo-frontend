name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - staging/roy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Create .env.staging
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.R_VITE_API_BASE_URL_STAGING }}" > .env.staging
          echo "VITE_APP_BASE_URL=${{ secrets.R_VITE_APP_BASE_URL_STAGING }}" >> .env.staging
          echo "VITE_KAKAO_REST_API_KEY=${{ secrets.R_VITE_KAKAO_REST_API_KEY_STAGING }}" >> .env.staging
          echo "VITE_KAKAO_REDIRECT_URI=${{ secrets.R_VITE_KAKAO_REDIRECT_URI_STAGING }}" >> .env.staging

      - name: Build project
        run: npm run build -- --mode staging

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.R_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R_AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Upload to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.R_S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.R_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
